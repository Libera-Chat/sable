services:
  # Primary IRC server
  sable-ircd-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sable-ircd-1
    hostname: server1.example.com
    ports:
      - "6667:6667"   # Plain text IRC
      - "6697:6697"   # TLS IRC
      - "6668:6668"   # Server-to-server gossip
      - "8888:8888"   # Management API
      - "9999:9999"   # Tokio console (optional, for debugging)
    volumes:
      # Mount configuration files
      - ./configs/network.conf:/sable/config/network.conf:ro
      - ./configs/server.conf:/sable/config/server.conf:ro
      # Mount network bootstrap config
      - ./configs/network_config.json:/sable/config/network_config.json:ro
      # Mount TLS certificates
      - ./certs:/sable/certs:ro
      # Mount data directory for logs and persistence
      - ./data:/sable/data
      # Mount MOTD file (optional)
      - ./configs/motd.txt:/sable/config/motd.txt:ro
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    networks:
      - sable-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fks", "https://localhost:8888/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Second IRC server for testing multi-server setup
  # Uncomment to run a second server in the network
  # sable-ircd-2:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: sable-ircd-2
  #   hostname: server2.example.com
  #   ports:
  #     - "7667:6667"
  #     - "7697:6697"
  #     - "7668:6668"
  #     - "8889:8888"
  #     - "9998:9999"
  #   volumes:
  #     - ./configs/network.conf:/sable/config/network.conf:ro
  #     - ./configs/server2.conf:/sable/config/server.conf:ro
  #     - ./configs/network_config.json:/sable/config/network_config.json:ro
  #     - ./certs:/sable/certs:ro
  #     - ./data/server2:/sable/data
  #   environment:
  #     - RUST_LOG=info
  #   networks:
  #     - sable-net
  #   restart: unless-stopped
  #   depends_on:
  #     - sable-ircd-1

networks:
  sable-net:
    driver: bridge

volumes:
  sable-data:
    driver: local
